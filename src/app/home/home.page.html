<ion-header class="modern-header">
  <ion-toolbar class="gradient-toolbar">
    <div class="header-content">
      <div class="logo-section">
        <ion-icon name="storefront" class="store-icon"></ion-icon>
        <ion-title class="modern-title">
          <span class="title-main">AfterClass</span>
          <span class="title-subtitle">Students on the go</span>
        </ion-title>
      </div>
      
      <div class="header-actions">
        <ion-icon name="search-outline" class="action-icon"></ion-icon>
        <ion-icon name="notifications-outline" class="action-icon">
          <span class="notification-badge">3</span>
        </ion-icon>
        <ion-icon name="cart-outline" class="action-icon">
          <span class="cart-badge">5</span>
        </ion-icon>
      </div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <h2 class="section-title">Available Items</h2>

  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" size-lg="3" *ngFor="let i of items">
        <ion-card class="product-card">
          <div class="tag" [ngClass]="i.tag.toLowerCase()">{{ i.tag }}</div>
          
          <!-- Wishlist Icon -->
          <ion-icon 
            [name]="i.isFavorite ? 'heart' : 'heart-outline'" 
            class="wishlist-icon"
            [class.active]="i.isFavorite"
            (click)="toggleFavorite(i)">
          </ion-icon>
          
          <img [src]="i.img" class="product-img" [alt]="i.name" />
          
          <ion-card-header>
            <ion-card-title>{{ i.name }}</ion-card-title>
            
            <!-- Category Pill -->
            <div class="pill" [ngClass]="i.category.toLowerCase()">{{ i.category }}</div>
            
            <!-- Rating Display -->
            <div class="rating-container">
              <span class="stars">
                <ion-icon 
                  *ngFor="let star of [1,2,3,4,5]" 
                  [name]="star <= i.rating ? 'star' : (star - 0.5 <= i.rating ? 'star-half' : 'star-outline')"
                  class="star-icon">
                </ion-icon>
              </span>
              <span class="rating-text">{{ i.rating }}</span>
            </div>
            
            <!-- Short Description -->
            <p class="product-description">{{ i.description }}</p>
            
            <!-- Improved Price -->
            <div class="price">₱{{ i.price }}</div>
          </ion-card-header>

          <ion-card-content>
            <ion-button size="small" expand="block">
              Buy Now
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
